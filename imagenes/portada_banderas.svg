<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" preserveAspectRatio="xMidYMid slice">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0052D4"/>
            <stop offset="100%" stop-color="#003B9F"/>
        </linearGradient>
        <linearGradient id="globe" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#43C6AC"/>
            <stop offset="100%" stop-color="#0052D4"/>
        </linearGradient>
        <radialGradient id="glow" cx="0.5" cy="0.4" r="0.6">
            <stop offset="0%" stop-color="#43C6AC" stop-opacity="0.35"/>
            <stop offset="100%" stop-color="#43C6AC" stop-opacity="0"/>
        </radialGradient>
    </defs>

    <rect width="400" height="500" fill="url(#bg)"/>
    <rect width="400" height="500" fill="url(#glow)"/>

    <!-- World map silhouette (simplified) -->
    <g opacity="0.15" fill="#ffffff">
        <path d="M40,140 q30,-10 60,-5 t50,15 q20,-5 40,2 t30,15 q15,-2 25,8 v20 q-25,5 -50,0 t-50,-12 q-30,5 -55,-3 t-50,-25 z"/>
        <path d="M250,170 q20,-8 40,-3 t30,12 q15,2 25,12 v18 q-20,3 -40,-5 t-35,-15 q-12,-3 -20,-15 z"/>
        <path d="M70,260 q25,5 45,15 t40,8 q20,8 35,22 t10,30 q-15,8 -35,5 t-40,-12 q-30,-5 -45,-25 t-10,-43 z"/>
        <path d="M280,290 q15,8 28,18 t12,28 q5,15 -10,22 t-25,-5 q-15,-12 -15,-30 t10,-33 z"/>
    </g>

    <!-- Globe -->
    <g transform="translate(200, 200)">
        <circle r="78" fill="url(#globe)" opacity="0.9"/>
        <circle r="78" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
        <ellipse cx="0" cy="0" rx="78" ry="28" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
        <ellipse cx="0" cy="0" rx="40" ry="78" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
        <ellipse cx="0" cy="0" rx="78" ry="55" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
    </g>

    <!-- Decorative flag pins around globe -->
    <g>
        <line x1="120" y1="165" x2="135" y2="200" stroke="#ffffff" stroke-width="1.5"/>
        <rect x="120" y="155" width="20" height="12" fill="#ef4444"/>
        <rect x="120" y="161" width="20" height="6" fill="#ffffff"/>

        <line x1="280" y1="165" x2="265" y2="200" stroke="#ffffff" stroke-width="1.5"/>
        <rect x="280" y="155" width="20" height="12" fill="#22c55e"/>
        <rect x="286" y="155" width="8" height="12" fill="#ffffff"/>

        <line x1="120" y1="265" x2="135" y2="240" stroke="#ffffff" stroke-width="1.5"/>
        <rect x="105" y="258" width="20" height="12" fill="#3b82f6"/>
        <rect x="105" y="264" width="20" height="6" fill="#fbbf24"/>

        <line x1="280" y1="265" x2="265" y2="240" stroke="#ffffff" stroke-width="1.5"/>
        <rect x="282" y="258" width="20" height="12" fill="#fbbf24"/>
        <rect x="288" y="258" width="8" height="12" fill="#ef4444"/>
    </g>

    <!-- Title -->
    <g text-anchor="middle" font-family="Montserrat, sans-serif" fill="#ffffff">
        <text x="200" y="370" font-size="14" font-weight="900" letter-spacing="6" opacity="0.85">COLECCIÓN ATLAS</text>
        <text x="200" y="412" font-size="34" font-weight="900">BANDERAS</text>
        <text x="200" y="445" font-size="34" font-weight="900">DEL MUNDO</text>
        <text x="200" y="475" font-size="11" font-weight="500" letter-spacing="3" opacity="0.7">ludolab.cl · juega · aprende · explora</text>
    </g>
</svg>
