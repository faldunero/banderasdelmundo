<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" preserveAspectRatio="xMidYMid slice">
    <defs>
        <linearGradient id="bgM" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#1f3a3d"/>
            <stop offset="100%" stop-color="#0f2426"/>
        </linearGradient>
        <linearGradient id="goldM" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#e0b96d"/>
            <stop offset="100%" stop-color="#b88a3e"/>
        </linearGradient>
        <linearGradient id="paperM" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#f6ecd0"/>
            <stop offset="100%" stop-color="#ddc99c"/>
        </linearGradient>
    </defs>

    <rect width="400" height="500" fill="url(#bgM)"/>

    <!-- Decorative frame -->
    <rect x="20" y="20" width="360" height="460" fill="none" stroke="url(#goldM)" stroke-width="3" rx="6"/>
    <rect x="32" y="32" width="336" height="436" fill="url(#paperM)" rx="3"/>

    <!-- Top medallion -->
    <g transform="translate(200, 120)">
        <circle r="58" fill="#1f3a3d" stroke="url(#goldM)" stroke-width="3"/>
        <!-- Woman silhouette (stylized) -->
        <g fill="#43C6AC" opacity="0.9">
            <circle cx="0" cy="-8" r="16"/>
            <path d="M-22,4 q22,-6 44,0 q-2,18 -22,22 q-20,-4 -22,-22 z"/>
            <path d="M-30,-10 q-3,-14 8,-22 q-10,2 -14,14 q1,5 6,8 z"/>
            <path d="M16,-22 q12,4 8,16"/>
        </g>
        <!-- Lightbulb idea symbol -->
        <g transform="translate(22, -22)" fill="#e0b96d">
            <circle r="6"/>
            <path d="M-2,5 h4 v3 h-4 z" fill="#1f3a3d"/>
        </g>
    </g>

    <!-- Laurel branches -->
    <g stroke="url(#goldM)" stroke-width="2" fill="url(#goldM)" opacity="0.85">
        <g transform="translate(85,160)">
            <path d="M0,0 q10,-30 25,-50" fill="none"/>
            <ellipse cx="6" cy="-10" rx="3" ry="6" transform="rotate(-30)"/>
            <ellipse cx="14" cy="-25" rx="3" ry="6" transform="rotate(-30)"/>
            <ellipse cx="22" cy="-40" rx="3" ry="6" transform="rotate(-30)"/>
        </g>
        <g transform="translate(315,160) scale(-1,1)">
            <path d="M0,0 q10,-30 25,-50" fill="none"/>
            <ellipse cx="6" cy="-10" rx="3" ry="6" transform="rotate(-30)"/>
            <ellipse cx="14" cy="-25" rx="3" ry="6" transform="rotate(-30)"/>
            <ellipse cx="22" cy="-40" rx="3" ry="6" transform="rotate(-30)"/>
        </g>
    </g>

    <!-- Main title -->
    <g text-anchor="middle" font-family="Montserrat, sans-serif" fill="#1f3a3d">
        <text x="200" y="240" font-size="26" font-weight="900">MUJERES</text>
        <text x="200" y="275" font-size="22" font-weight="800">QUE CAMBIARON</text>
        <text x="200" y="305" font-size="22" font-weight="800">EL MUNDO</text>
    </g>

    <!-- Decorative divider -->
    <g transform="translate(200, 330)" stroke="url(#goldM)" fill="url(#goldM)">
        <line x1="-60" y1="0" x2="-15" y2="0" stroke-width="1.5"/>
        <line x1="15" y1="0" x2="60" y2="0" stroke-width="1.5"/>
        <circle r="3"/>
    </g>

    <!-- Subtitle -->
    <g text-anchor="middle" font-family="Montserrat, sans-serif" fill="#1f3a3d">
        <text x="200" y="360" font-size="14" font-weight="700" letter-spacing="4">GRANDES LÍDERES</text>
    </g>

    <!-- Banner ribbon -->
    <g transform="translate(200, 410)">
        <path d="M-130,0 l130,-15 l130,15 l-15,18 l-115,-13 l-115,13 z" fill="url(#goldM)"/>
        <path d="M-130,0 l-12,18 l12,0 z" fill="#8a6427"/>
        <path d="M130,0 l12,18 l-12,0 z" fill="#8a6427"/>
        <text text-anchor="middle" y="6" font-family="Montserrat, sans-serif" font-size="11" font-weight="800" letter-spacing="3" fill="#1f3a3d">COLECCIÓN · LUDOLAB.CL</text>
    </g>
</svg>
