<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de cartas — Banderas del Mundo · Ludolab</title>
    <meta name="description" content="Catálogo completo de las 52 cartas del juego Banderas del Mundo de Ludolab.cl — donde la curiosidad se convierte en conocimiento.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Poppins:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* ============================================================
           Brand Book Ludolab — paleta "Tech-Vital"
           ============================================================ */
        :root {
            --azul-profundo: #0052D4;
            --verde-cian:    #43C6AC;
            --blanco:        #FFFFFF;
            --gris-neutro:   #F1F5F9;
            --texto:         #0F172A;          /* tinte oscuro derivado de azul profundo */
            --texto-suave:   #475569;
            --gris-borde:    #E2E8F0;
            --grad-marca:    linear-gradient(135deg, #0052D4 0%, #43C6AC 100%);
            --sombra-card:   0 8px 24px rgba(15, 23, 42, 0.08);
            --sombra-hover:  0 18px 40px rgba(0, 82, 212, 0.22);
            --sombra-cta:    0 8px 22px rgba(0, 82, 212, 0.32);
        }

        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Poppins', system-ui, sans-serif;
            color: var(--texto);
            margin: 0;
            padding: 0 20px 40px;
            background: var(--blanco);
            -webkit-font-smoothing: antialiased;
        }

        /* ============================================================
           Hero / banner — degradado de marca como acento superior
           ============================================================ */
        .hero {
            width: 100vw;
            margin-left: calc(-50vw + 50%);
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--blanco);
            position: relative;
            padding: 0 0 8px;
        }
        .hero::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 6px;
            background: var(--grad-marca);
        }
        .hero img { display: block; width: 100%; max-width: 480px; height: auto; padding-top: 14px; }
        @media (max-width: 520px) { .hero img { max-width: 70%; } }

        .contenedor { max-width: 1200px; margin: 0 auto; }

        /* ============================================================
           Cabecera
           ============================================================ */
        .cabecera-pag { text-align: center; margin: 18px 0 8px; }
        .cabecera-pag h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 38px;
            margin: 0 0 8px;
            letter-spacing: -0.6px;
            color: var(--azul-profundo);
            background: var(--grad-marca);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .cabecera-pag .sub {
            display: block;
            font-family: 'Montserrat', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2.2px;
            text-transform: uppercase;
            color: var(--texto-suave);
        }
        .cabecera-pag .lema {
            display: block;
            margin-top: 10px;
            font-size: 13px;
            color: var(--texto-suave);
            font-style: italic;
        }

        /* ============================================================
           Botones de navegación
           ============================================================ */
        .nav-acciones {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 28px auto;
        }
        .btn-nav {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 13px 24px;
            border-radius: 14px;
            border: 1.5px solid var(--gris-borde);
            background: var(--blanco);
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 1.4px;
            text-transform: uppercase;
            color: var(--texto);
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s, border-color 0.2s, transform 0.15s, box-shadow 0.2s, color 0.2s;
        }
        .btn-nav:hover {
            background: var(--gris-neutro);
            border-color: var(--azul-profundo);
            color: var(--azul-profundo);
            transform: translateY(-1px);
        }
        .btn-nav.primario {
            background: var(--grad-marca);
            border-color: transparent;
            color: var(--blanco);
            box-shadow: var(--sombra-cta);
        }
        .btn-nav.primario:hover {
            background: var(--grad-marca);
            color: var(--blanco);
            border-color: transparent;
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(0, 82, 212, 0.42);
        }

        /* ============================================================
           Títulos de sección por continente
           ============================================================ */
        h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 16px;
            font-weight: 800;
            letter-spacing: 2.2px;
            text-transform: uppercase;
            color: var(--azul-profundo);
            border-bottom: 2px solid var(--gris-neutro);
            padding-bottom: 12px;
            margin: 44px 0 22px;
            position: relative;
        }
        h2::before {
            content: "";
            position: absolute;
            left: 0;
            bottom: -2px;
            width: 64px;
            height: 2px;
            background: var(--grad-marca);
        }
        h2 small {
            color: var(--texto-suave);
            font-weight: 600;
            letter-spacing: 1.4px;
            font-size: 12px;
            margin-left: 8px;
        }

        /* ============================================================
           Grid de cartas
           ============================================================ */
        .grid-cartas {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 28px;
            padding: 14px 6px 20px;
        }
        .carta-item {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            transition: transform 0.3s ease, z-index 0s linear 0.3s;
            transform-origin: center center;
            position: relative;
            z-index: 1;
            background: var(--gris-neutro);
            padding: 14px 12px 12px;
            border-radius: 18px;
            border: 1px solid transparent;
        }
        .carta-item.estatica { cursor: default; }
        .carta-item img {
            width: 100%;
            max-width: 200px;
            height: auto;
            display: block;
            border-radius: 12px;
            box-shadow: var(--sombra-card);
            transition: box-shadow 0.3s ease;
        }
        .carta-item:hover {
            transform: scale(1.45);
            z-index: 30;
            transition: transform 0.3s ease, z-index 0s;
            background: var(--blanco);
            border-color: var(--verde-cian);
            box-shadow: var(--sombra-hover);
        }
        .carta-item.estatica:hover {
            transform: scale(1.15);
        }
        .carta-item:hover img { box-shadow: 0 22px 44px rgba(0, 82, 212, 0.28); }
        .carta-item .etiqueta {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }
        .carta-item .id-carta {
            font-family: 'JetBrains Mono', ui-monospace, monospace;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--azul-profundo);
            background: var(--blanco);
            padding: 2px 8px;
            border-radius: 6px;
            border: 1px solid var(--gris-borde);
        }
        .carta-item:hover .id-carta {
            background: var(--azul-profundo);
            color: var(--blanco);
            border-color: var(--azul-profundo);
        }
        .carta-item .nombre-pais {
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            color: var(--texto);
            font-weight: 500;
            text-align: center;
        }

        @media (max-width: 520px) {
            .grid-cartas { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 18px; }
            .cabecera-pag h1 { font-size: 28px; }
            .carta-item:hover { transform: scale(1.25); }
        }

        /* ============================================================
           Footer — aplicación de marca según Brand Book
           ============================================================ */
        .creditos {
            width: 100%;
            text-align: center;
            padding: 44px 0 32px;
            margin-top: 56px;
            border-top: 1px solid var(--gris-neutro);
            background: var(--blanco);
            position: relative;
        }
        .creditos::before {
            content: "";
            position: absolute;
            top: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 96px;
            height: 3px;
            background: var(--grad-marca);
            border-radius: 3px;
        }
        .creditos a {
            display: inline-block;
            opacity: 0.95;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }
        .creditos a:hover { opacity: 1; transform: translateY(-2px); }
        .creditos img { height: 46px; width: auto; display: block; margin: 0 auto; }
        .creditos .firma {
            display: block;
            margin-top: 14px;
            font-family: 'Montserrat', sans-serif;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: var(--azul-profundo);
        }
        .creditos .tagline {
            display: block;
            margin-top: 6px;
            font-family: 'Montserrat', sans-serif;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2.2px;
            text-transform: uppercase;
            color: var(--texto-suave);
        }
    </style>
</head>
<body>

    <header class="hero">
        <img src="imagenes/banner_04.png" alt="Banderas del Mundo — Ludolab">
    </header>

    <div class="contenedor">
        <div class="cabecera-pag">
            <h1>Catálogo de cartas</h1>
            <span class="sub">52 países · 3 cartas de truco</span>
            <span class="lema">Donde la curiosidad se convierte en conocimiento.</span>
        </div>

        <div class="nav-acciones">
            <a href="index.html" class="btn-nav primario">← Volver al buscador</a>
            <button class="btn-nav" id="btnCerrarTop" type="button">Cerrar</button>
        </div>

        <h2>América <small>(19)</small></h2>
        <div class="grid-cartas" id="grid-AM"></div>

        <h2>Europa <small>(15)</small></h2>
        <div class="grid-cartas" id="grid-EU"></div>

        <h2>Asia <small>(8)</small></h2>
        <div class="grid-cartas" id="grid-AS"></div>

        <h2>África <small>(6)</small></h2>
        <div class="grid-cartas" id="grid-AF"></div>

        <h2>Oceanía <small>(4)</small></h2>
        <div class="grid-cartas" id="grid-OC"></div>

        <h2>Cartas de truco <small>(3 diseños)</small></h2>
        <div class="grid-cartas" id="grid-ES"></div>

        <div class="nav-acciones">
            <a href="index.html" class="btn-nav primario">← Volver al buscador</a>
            <button class="btn-nav" id="btnCerrarBottom" type="button">Cerrar</button>
        </div>
    </div>

    <footer class="creditos">
        <a href="https://ludolab.cl" target="_blank" rel="noopener" title="ludolab.cl">
            <img src="imagenes/logotipo.png" alt="ludolab.cl — Juega, Aprende, Explora">
        </a>
        <span class="firma">Una experiencia de Ludolab.cl</span>
        <span class="tagline">Juega · Aprende · Explora</span>
    </footer>

    <script>
        // Catálogo compacto (coincide con dbPaises en index.html)
        const paises = [
            ["AM-01","AM-01AR","Argentina"],["AM-02","AM-02BO","Bolivia"],["AM-03","AM-03BR","Brasil"],
            ["AM-04","AM-04CA","Canadá"],["AM-05","AM-05CL","Chile"],["AM-06","AM-06CO","Colombia"],
            ["AM-07","AM-07CR","Costa Rica"],["AM-08","AM-08CU","Cuba"],["AM-09","AM-09EC","Ecuador"],
            ["AM-10","AM-10US","EE. UU."],["AM-11","AM-11GT","Guatemala"],["AM-12","AM-12MX","México"],
            ["AM-13","AM-13PA","Panamá"],["AM-14","AM-14PE","Perú"],["AM-15","AM-15PY","Paraguay"],
            ["AM-16","AM-16UY","Uruguay"],["AM-17","AM-17VE","Venezuela"],["AM-18","AM-18DO","Rep.Dominicana"],
            ["AM-19","AM-19HN","Honduras"],
            ["EU-01","EU-01DE","Alemania"],["EU-02","EU-02ES","España"],["EU-03","EU-03FR","Francia"],
            ["EU-04","EU-04IT","Italia"],["EU-05","EU-05GR","Grecia"],["EU-06","EU-06PT","Portugal"],
            ["EU-07","EU-07GB","Reino Unido"],["EU-08","EU-08NL","Países Bajos"],["EU-09","EU-09CH","Suiza"],
            ["EU-10","EU-10SE","Suecia"],["EU-11","EU-11NO","Noruega"],["EU-12","EU-12PL","Polonia"],
            ["EU-13","EU-13BE","Bélgica"],["EU-14","EU-14AT","Austria"],["EU-15","EU-15IE","Irlanda"],
            ["AS-01","AS-01CN","China"],["AS-02","AS-02JP","Japón"],["AS-03","AS-03IN","India"],
            ["AS-04","AS-04KR","Corea del Sur"],["AS-05","AS-05TR","Turquía"],["AS-06","AS-06TH","Tailandia"],
            ["AS-07","AS-07IL","Israel"],["AS-08","AS-08VN","Vietnam"],
            ["AF-01","AF-01EG","Egipto"],["AF-02","AF-02ZA","Sudáfrica"],["AF-03","AF-03MA","Marruecos"],
            ["AF-04","AF-04NG","Nigeria"],["AF-05","AF-05KE","Kenia"],["AF-06","AF-06SN","Senegal"],
            ["OC-01","OC-01AU","Australia"],["OC-02","OC-02NZ","Nueva Zelanda"],
            ["OC-03","OC-03PG","Papúa Nueva Guinea"],["OC-04","OC-04FJ","Fiji"]
        ];

        const especiales = [
            ["ES-01","ES-01_robo_turno.png","Robo de turno"],
            ["ES-02","ES-02_pierde_turno.png","Pierde turno"],
            ["ES-03","ES-03_descarta_carta.png","Descarta carta"]
        ];

        paises.forEach(([idCorto, idCompleto, nombre]) => {
            const prefijo = idCorto.split("-")[0];
            const grid = document.getElementById('grid-' + prefijo);
            const div = document.createElement('div');
            div.className = 'carta-item';
            div.title = `Ver detalle de ${nombre}`;
            div.innerHTML = `
                <img src="cartas_png/${idCorto}.png" alt="Carta ${idCorto} — ${nombre}" loading="lazy">
                <div class="etiqueta">
                    <span class="id-carta">${idCorto}</span>
                    <span class="nombre-pais">${nombre}</span>
                </div>
            `;
            div.onclick = () => { location.href = 'index.html?id=' + encodeURIComponent(idCompleto); };
            grid.appendChild(div);
        });

        especiales.forEach(([id, archivo, nombre]) => {
            const grid = document.getElementById('grid-ES');
            const div = document.createElement('div');
            div.className = 'carta-item estatica';
            div.innerHTML = `
                <img src="cartas_especiales_png/${archivo}" alt="Carta especial ${nombre}" loading="lazy">
                <div class="etiqueta">
                    <span class="id-carta">${id}</span>
                    <span class="nombre-pais">${nombre}</span>
                </div>
            `;
            grid.appendChild(div);
        });

        // Cerrar: intenta cerrar la pestaña; si no se puede, vuelve al index
        function cerrar() {
            window.close();
            setTimeout(() => { location.href = 'index.html'; }, 120);
        }
        document.getElementById('btnCerrarTop').onclick = cerrar;
        document.getElementById('btnCerrarBottom').onclick = cerrar;
    </script>
</body>
</html>
