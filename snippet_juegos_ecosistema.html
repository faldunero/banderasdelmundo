<!-- ============ VARIANTE A: tarjeta con icono + título + bajada + CTA ============ -->
<a href="juegos.html" class="eco-item eco-item-juegos" data-categoria="juegos">
    <div class="eco-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="3.5"/>
            <circle cx="8"  cy="8"  r="1.4" fill="currentColor" stroke="none"/>
            <circle cx="16" cy="16" r="1.4" fill="currentColor" stroke="none"/>
            <circle cx="16" cy="8"  r="1.4" fill="currentColor" stroke="none"/>
            <circle cx="8"  cy="16" r="1.4" fill="currentColor" stroke="none"/>
            <circle cx="12" cy="12" r="1.4" fill="currentColor" stroke="none"/>
        </svg>
    </div>
    <div class="eco-cuerpo">
        <span class="eco-eyebrow">Catálogo</span>
        <h3 class="eco-titulo">Juegos</h3>
        <p class="eco-bajada">
            Aventuras educativas para aprender jugando. Banderas del mundo, mujeres líderes y
            más por venir — diseño cuidado, contenidos verificados y diversión asegurada.
        </p>
        <span class="eco-cta">
            Explorar catálogo
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
                <line x1="5" y1="12" x2="19" y2="12"/>
                <polyline points="12 5 19 12 12 19"/>
            </svg>
        </span>
    </div>
</a>


<!-- ============ ESTILOS (sólo si tu sección no tiene clases equivalentes) ============ -->
<style>
.eco-item {
    display: flex;
    flex-direction: column;
    gap: 14px;
    padding: 28px 26px;
    background: #ffffff;
    border-radius: 20px;
    border: 1px solid #e2e8f0;
    box-shadow: 0 4px 16px rgba(15,23,42,0.04);
    text-decoration: none;
    color: #0f172a;
    transition: transform .25s, box-shadow .25s, border-color .25s;
    position: relative;
    overflow: hidden;
}
.eco-item::before {
    content: "";
    position: absolute; top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, #0052D4 0%, #43C6AC 100%);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform .3s ease;
}
.eco-item:hover {
    transform: translateY(-4px);
    box-shadow: 0 18px 40px rgba(0,82,212,0.14);
    border-color: #43C6AC;
}
.eco-item:hover::before { transform: scaleX(1); }

.eco-icon {
    width: 56px; height: 56px;
    border-radius: 14px;
    background: linear-gradient(135deg, #0052D4 0%, #43C6AC 100%);
    color: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 6px 18px rgba(0,82,212,0.25);
}
.eco-icon svg { width: 28px; height: 28px; }

.eco-cuerpo { display: flex; flex-direction: column; gap: 8px; }
.eco-eyebrow {
    font-family: 'Montserrat', sans-serif;
    font-size: 10px;
    font-weight: 900;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #43C6AC;
}
.eco-titulo {
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: 22px;
    margin: 0;
    color: #0f172a;
}
.eco-bajada {
    font-size: 14px;
    color: #475569;
    line-height: 1.6;
    margin: 0;
}
.eco-cta {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #0052D4;
    margin-top: 6px;
    transition: gap .2s;
}
.eco-item:hover .eco-cta { gap: 12px; color: #003B9F; }
</style>
