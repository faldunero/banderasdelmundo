<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Carta especial</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; background: transparent; font-family: 'Space Grotesk', sans-serif; }

        /* ===== CARTA TAMAÑO PÓKER (63×88mm) ===== */
        .carta {
            /* Paleta inyectada por el generador */
            --c1: {{COLOR_PRIMARIO}};
            --c2: {{COLOR_SECUNDARIO}};
            --brillo: {{COLOR_BRILLO}};
            --halo1: {{HALO1}};
            --halo2: {{HALO2}};
            --borde-interno: {{BORDE_INTERNO}};
            --sombra-medallon: {{SOMBRA_MEDALLON}};

            width: 252px;
            height: 352px;
            border-radius: 16px;
            background:
                radial-gradient(circle at 20% 0%, var(--halo1), transparent 55%),
                radial-gradient(circle at 100% 100%, var(--halo2), transparent 55%),
                linear-gradient(145deg, #fdfbf6 0%, #f3eee0 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 14px;
            border: 1px solid rgba(0,0,0,0.06);
        }
        .carta::before {
            content: "";
            position: absolute;
            inset: 6px;
            border-radius: 11px;
            border: 1px solid var(--borde-interno);
            pointer-events: none;
            z-index: 0;
        }
        .carta > * { position: relative; z-index: 1; }

        /* Cabecera */
        .titulo {
            text-align: center;
            padding: 4px 0 10px;
            border-bottom: 1px solid rgba(30,39,46,0.08);
            margin-bottom: 6px;
        }
        .titulo .eyebrow {
            display: block;
            font-size: 8px;
            font-weight: 800;
            letter-spacing: 3px;
            color: var(--c2);
            text-transform: uppercase;
            margin-bottom: 3px;
        }
        .titulo .nombre-juego {
            display: block;
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 0.5px;
            color: #1e272e;
            text-transform: uppercase;
        }
        .titulo .nombre-juego .acento { color: #0984e3; }

        /* Hero central */
        .zona-hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 4px 0;
            position: relative;
        }
        .rayos {
            position: absolute;
            inset: 10px 0 30px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.35;
            z-index: 0;
            width: 100%;
            height: calc(100% - 40px);
        }
        .rayos .rayos-primarios polygon { fill: var(--c1); }
        .rayos .rayos-secundarios polygon { fill: var(--c2); opacity: 0.7; }

        .medallon {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 25%, var(--brillo) 0%, var(--c1) 55%, var(--c2) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow:
                inset 0 -6px 14px rgba(0,0,0,0.18),
                inset 0 6px 10px rgba(255,255,255,0.35),
                0 10px 22px var(--sombra-medallon);
            position: relative;
            z-index: 1;
        }
        .medallon::after {
            content: "";
            position: absolute;
            inset: 5px;
            border-radius: 50%;
            border: 2px dashed rgba(255,255,255,0.55);
        }
        .medallon .icono-accion { position: relative; z-index: 2; width: 62px; height: 62px; }

        .accion {
            text-align: center;
            z-index: 1;
            position: relative;
        }
        .accion .nombre {
            display: block;
            font-size: 19px;
            font-weight: 800;
            letter-spacing: 0.5px;
            color: #1e272e;
            text-transform: uppercase;
            line-height: 1.05;
        }
        .accion .nombre .sub { color: var(--c2); }
        .accion .tagline {
            display: block;
            margin-top: 6px;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #8a93a0;
        }

        /* Pie */
        .pie {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px 4px 2px;
            margin-top: 6px;
            border-top: 1px solid rgba(30,39,46,0.08);
        }
        .marca { font-weight: 700; font-size: 11px; letter-spacing: 2.5px; color: #8a93a0; }
    </style>
</head>
<body>
    <div class="carta">
        <div class="titulo">
            <span class="eyebrow">Carta especial</span>
            <span class="nombre-juego">Banderas <span class="acento">del Mundo</span></span>
        </div>

        <div class="zona-hero">
            <svg class="rayos" viewBox="-100 -100 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <g class="rayos-primarios">
                    <polygon points="0,-95 4,-60 -4,-60"/>
                    <polygon points="0,95 4,60 -4,60"/>
                    <polygon points="-95,0 -60,4 -60,-4"/>
                    <polygon points="95,0 60,4 60,-4"/>
                    <polygon points="-67,-67 -45,-42 -42,-45"/>
                    <polygon points="67,67 45,42 42,45"/>
                    <polygon points="-67,67 -45,42 -42,45"/>
                    <polygon points="67,-67 45,-42 42,-45"/>
                </g>
                <g class="rayos-secundarios">
                    <polygon points="0,-80 2,-52 -2,-52"/>
                    <polygon points="0,80 2,52 -2,52"/>
                    <polygon points="-80,0 -52,2 -52,-2"/>
                    <polygon points="80,0 52,2 52,-2"/>
                </g>
            </svg>

            <div class="medallon">
                {{ICONO_SVG}}
            </div>

            <div class="accion">
                <span class="nombre">{{NOMBRE_LINEA_1}}<br><span class="sub">{{NOMBRE_LINEA_2}}</span></span>
                <span class="tagline">{{TAGLINE}}</span>
            </div>
        </div>

        <div class="pie">
            <span class="marca">LUDOLAB.CL</span>
        </div>
    </div>
</body>
</html>
